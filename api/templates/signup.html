{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 비밀 메시지 서비스</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="auth-container">
        <h2>🛡️ 회원가입</h2>
        <p class="auth-subtitle">정보를 입력하여 계정을 생성하세요.</p>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            
            <div class="input-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="사용할 아이디 입력" required>
            </div>

            <div class="input-group">
                <label>이메일</label>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="input-group">
                <label>전화번호</label>
                <input type="tel" name="phone" placeholder="010-0000-0000" required>
            </div>

            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호 입력" required>
            </div>

            <div class="input-group">
                <label>비밀번호 확인</label>
                <input type="password" name="password_confirm" placeholder="비밀번호 재입력" required>
            </div>

            <button type="submit" class="btn-submit">가입하기</button>
            
            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="/auth/login/">로그인</a>
            </div>
        </form>
    </div>
</body>
</html>
