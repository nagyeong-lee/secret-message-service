{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pung Message</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>💣 Pung Message</h1>
        <p>반갑습니다, <strong>{{ user.username }}</strong>님!</p>

        <div id="input-area">
            <textarea id="messageInput" placeholder="비밀 내용을 입력하세요..."></textarea>
            <button id="generateBtn" class="btn-main">QR 메시지 생성하기</button>
        </div>

        <div id="qr-result" style="display: none;">
            <h3>🔒 생성 완료!</h3>
            <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
            
            <button id="copyBtn" class="btn-main" style="background-color: #55acee; margin-top: 15px;">
                🔗 링크 복사하기
            </button>
            <p id="copyMsg" style="display:none; color: #6c5ce7; font-size: 0.8rem; margin-top: 5px;">복사되었습니다!</p>
            
            <button onclick="location.reload()" style="background:none; border:none; color:#b2bec3; text-decoration:underline; cursor:pointer; margin-top: 20px;">새로 만들기</button>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', function() {
            const message = document.getElementById('messageInput').value;
            if (!message) { alert("메시지를 입력해주세요!"); return; }

            // 버튼 비활성화 (중복 클릭 방지)
            const btn = this;
            btn.disabled = true;
            btn.innerText = "생성 중...";

            // 1. 백엔드 API에 메시지 저장 요청
            fetch('/api/messages/create/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}' // 장고 보안 토큰
                },
                body: JSON.stringify({ 'content': message })
            })
            .then(response => {
                if (!response.ok) throw new Error('서버 응답 오류');
                return response.json();
            })
            .then(data => {
                if (data.secret_url) {
                    // 2. 백엔드에서 받은 진짜 UUID 주소 사용
                    const realUrl = window.location.origin + data.secret_url;

                    // 3. 화면 전환
                    document.getElementById('input-area').style.display = 'none';
                    document.getElementById('qr-result').style.display = 'block';

                    // 4. QR 코드 생성 (백엔드 주소 데이터 반영)
                    const qrcodeContainer = document.getElementById("qrcode");
                    qrcodeContainer.innerHTML = ""; 
                    new QRCode(qrcodeContainer, {
                        text: realUrl,
                        width: 200,
                        height: 200,
                        colorDark : "#6c5ce7"
                    });

                    // 5. 복사하기 버튼 연결
                    document.getElementById('copyBtn').onclick = function() {
                        navigator.clipboard.writeText(realUrl).then(() => {
                            const msg = document.getElementById('copyMsg');
                            msg.style.display = 'block';
                            setTimeout(() => msg.style.display = 'none', 2000);
                        });
                    };
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("메시지 생성 중 오류가 발생했습니다. 백엔드 서버를 확인해주세요.");
                btn.disabled = false;
                btn.innerText = "QR 메시지 생성하기";
            });
        });
    </script>
</body>
</html>
